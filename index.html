<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Roll the Dice</title>
</head>
<body>

<div class="container">

    <!-- Header -->
    <div class="header">
        <h1>🎲 Roll the Dice</h1>
        <div class="stats-row">
            <div class="stat-box">
                <span class="stat-value" id="roll-count">0</span>
                <span class="stat-label">Rolls</span>
            </div>
            <div class="stat-box">
                <span class="stat-value" id="best-score">—</span>
                <span class="stat-label">Best</span>
            </div>
            <div class="stat-box">
                <span class="stat-value" id="avg-score">—</span>
                <span class="stat-label">Avg</span>
            </div>
        </div>
    </div>

    <!-- Dice Area -->
    <div class="dice-section">
        <div class="dice-wrapper">
            <div class="die-container">
                <div class="die-face" id="die-1">⚀</div>
                <span class="die-value" id="val-1">1</span>
            </div>
            <div class="plus-sign">+</div>
            <div class="die-container">
                <div class="die-face" id="die-2">⚁</div>
                <span class="die-value" id="val-2">2</span>
            </div>
        </div>

        <!-- Total Display -->
        <div class="total-display" id="total-display">
            <span class="total-label">Total</span>
            <span class="total-value" id="total-value">3</span>
            <span class="roll-badge" id="roll-badge"></span>
        </div>
    </div>

    <!-- Buttons -->
    <div class="btn-row">
        <button class="btn-roll" id="roll-btn" onclick="roll()">Roll!</button>
        <button class="btn-restart" onclick="restart()" title="Restart">↺ Restart</button>
    </div>

    <!-- History -->
    <div class="history-section" id="history-section">
        <div class="history-header">
            <span>Roll History</span>
            <button class="clear-btn" onclick="clearHistory()">Clear</button>
        </div>
        <div class="history-list" id="history-list">
            <p class="history-empty">No rolls yet. Roll the dice!</p>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
